version: '3.8'

services:
  db:
    image: gvenzl/oracle-xe:latest
    container_name: clyvo_oracle
    environment:
      - ORACLE_PASSWORD=ClyvoChallenge2026!
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
    networks:
      - clyvo_network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clyvo_api
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Data Source=db:1521/XEPDB1;User Id=system;Password=ClyvoChallenge2026!;
      - ASPNETCORE_ENVIRONMENT=Development
    networks:
      - clyvo_network

volumes:
  oracle_data:

networks:
  clyvo_network:
    driver: bridge